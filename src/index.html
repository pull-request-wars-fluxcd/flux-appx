<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CNCF Wars: Destroy the Death Star</title>
  <meta name="description" content="Pilot your cloud-native starfighter and destroy the Death Star in this Star Wars themed browser game.">
  <meta name="theme-color" content="#000000">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><polygon points='50,5 61,40 98,40 68,62 79,97 50,75 21,97 32,62 2,40 39,40' fill='%23FFE81F'/></svg>">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #FFE81F;
      font-family: 'Arial Black', Arial, sans-serif;
      font-size: 1.5rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="loading">Loading…</div>
  <canvas id="gameCanvas"></canvas>
  <noscript>
    <p style="color:#FFE81F;text-align:center;margin-top:2rem;font-family:Arial,sans-serif;">
      JavaScript is required to play CNCF Wars. Please enable JavaScript and reload the page.
    </p>
  </noscript>
  <script src="game.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      startGame();
      var loader = document.getElementById('loading');
      if (loader) loader.remove();
    });
  </script>
</body>
</html>
